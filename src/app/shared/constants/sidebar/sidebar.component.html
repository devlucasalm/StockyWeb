<aside class="sidebar" [class.collapsed]="collapsed()">

  <div class="sidebar__brand">
    <div class="brand-icon">
      <span class="material-symbols-outlined">deployed_code</span>
    </div>
    <span class="brand-name">Stocky</span>
  </div>

  <div class="sidebar__divider"></div>

  <nav class="sidebar__nav">
    <a
      *ngFor="let item of navItems"
      class="nav-item"
      [routerLink]="item.route"
      routerLinkActive="nav-item--active"
    >
      <span class="material-symbols-outlined nav-item__icon">{{ item.icon }}</span>
      <span class="nav-item__label">{{ item.label }}</span>
    </a>
  </nav>

  <button class="sidebar__toggle" (click)="toggleCollapse()" [attr.aria-label]="collapsed() ? 'Expandir menu' : 'Recolher menu'">
    <span class="material-symbols-outlined">
      {{ collapsed() ? 'chevron_right' : 'chevron_left' }}
    </span>
  </button>

</aside>
